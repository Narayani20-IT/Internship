<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect</title>
    <style>
        body {
            background-color: bisque;
        }
        button {
            background-color: blue;
            color: white;
            border-radius: 5px;
            padding: 15px 25px;
            font-size: 15px;
        }
        button:hover {
            background-color: red;
        }
    </style>
</head>
<body>
    <h2>Hover Effect Example</h2>
    <button>Hover Me</button>
</body>
</html>
