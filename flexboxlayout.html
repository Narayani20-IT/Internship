<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box Layout</title>
    <style>
    .container {
        display: flex;
        gap: 10px;
    }

    .box {
        background: lightblue;
        padding: 20px;
    }
</style>
</head>
<body>
    <h2 style="text-align: center;">FlexBox Layout</h2>
    <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
</div>    
</body>
</html>
