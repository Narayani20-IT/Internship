<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Menu</title>
    <style>
        .dropdown:hover .menu {
            display: block;
        }

        .menu {
            display: none;
        }
    </style>
</head>



<body>
    <div class="dropdown">
        Menu
        <div class="menu">
            <p>Home</p>
            <p>About</p>
            <p>Contact</p>
        </div>
    </div>

</body>

</html>
